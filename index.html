<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS + Riwayat & Total - Monitor Dapur Kedai Moods</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #1e1e24;
            color: #fff;
            padding: 20px;
        }

        header {
            background-color: #ff4757;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        header h1 { font-size: 1.6rem; letter-spacing: 2px; }
        header .time { font-size: 1.1rem; font-weight: bold; }

        /* SIMULATOR INPUT KASIR */
        .simulator-box {
            background: #2f3542;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px dashed #747d8c;
        }
        .simulator-box h3 { margin-bottom: 10px; color: #ffa502; }
        .simulator-box select, .simulator-box input, .simulator-box button {
            padding: 8px; margin-right: 10px; font-weight: bold; margin-bottom: 5px;
        }
        .simulator-box button { background: #2ed573; border: none; cursor: pointer; color: black;}

        /* MONITOR UTAMA (ANTREAN AKTIF) */
        .section-title {
            font-size: 1.4rem;
            color: #ffa502;
            margin-bottom: 15px;
            border-left: 5px solid #ffa502;
            padding-left: 10px;
        }

        .kds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* TIKET PESANAN */
        .ticket-card {
            background: #ffffff;
            color: #000000;
            border-radius: 6px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 8px solid #ffa502;
        }

        .ticket-card.urgent {
            border-top: 8px solid #ff4757;
            animation: blink 2s infinite;
        }

        .ticket-header {
            background: #f1f2f6;
            padding: 10px;
            border-bottom: 2px dashed #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticket-id { font-size: 1.3rem; font-weight: bold; }
        .ticket-meta { font-size: 0.8rem; text-align: right; color: #57606f; }

        .ticket-body {
            padding: 15px;
            flex-grow: 1;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1.05rem;
            font-weight: bold;
        }

        .item-qty { color: #ff4757; margin-right: 5px; }
        .item-notes { font-size: 0.85rem; color: #747d8c; margin-left: 25px; margin-bottom: 10px; font-style: italic; }

        .ticket-footer { padding: 10px; background: #f1f2f6; border-top: 1px solid #ddd; }
        .btn-done {
            width: 100%; background-color: #2ed573; color: white; border: none;
            padding: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            border-radius: 4px; text-transform: uppercase;
        }

        /* KOTAK RINGKASAN TOTAL JUMLAH */
        .summary-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .summary-card {
            background: #1e1e24;
            padding: 15px;
            border-radius: 6px;
            flex: 1;
            border: 1px solid #3f4451;
            text-align: center;
        }
        .summary-card p { font-size: 0.9rem; color: #a4b0be; margin-bottom: 5px; }
        .summary-card h4 { font-size: 1.5rem; color: #2ed573; }

        /* SECTION RIWAYAT */
        .history-box {
            background: #2f3542;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #212529;
        }

        .history-table th, .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #3f4451;
            font-size: 0.95rem;
        }

        .history-table th {
            background-color: #ff4757;
            color: white;
        }

        .history-table tr:hover {
            background-color: #2b303c;
        }

        .status-badge {
            background-color: #2ed573;
            color: black;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        @keyframes blink {
            0% { box-shadow: 0 0 5px #ff4757; }
            50% { box-shadow: 0 0 20px #ff4757; }
            100% { box-shadow: 0 0 5px #ff4757; }
        }
    </style>
</head>
<body>

        <input type="number" id="sim-qty" value="1" min="1" style="width: 50px;">

    <h2 class="section-title">Pesanan Antrean Aktif (Dapur)</h2>
    <div class="kds-grid" id="kds-area"></div>

    <div class="history-box">
        <h2 class="section-title" style="color:#2ed573; border-left-color:#2ed573;">Riwayat Pesanan Selesai / Terkirim</h2>
        
        <div class="summary-wrapper">
            <div class="summary-card">
                <p>🛍️ TOTAL ITEM TERJUAL</p>
                <h4 id="total-qty-terjual" style="color: #ffa502;">0 Porsi</h4>
            </div>
            <div class="summary-card">
                <p>💰 TOTAL PENDAPATAN (OMZET)</p>
                <h4 id="total-omzet">Rp 0</h4>
            </div>
        </div>

        <table class="history-table">
            <thead>
                <tr>
                    <th>Waktu Selesai</th>
                    <th>ID Tiket</th>
                    <th>No. Meja</th>
                    <th>Item Pesanan</th>
                    <th>Catatan</th>
                    <th>Total Harga</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="history-area"></tbody>
        </table>
    </div>

    <script>
        let orderCount = 101;
        let dataTiketAktif = {};
        
        // Variabel penampung jumlah hitungan total akumulasi
        let akumulasiOmzet = 0;
        let akumulasiQty = 0;

        // Jam Digital
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('id-ID');
        }, 1000);

        function kirimKeDapur() {
            const meja = document.getElementById('sim-meja').value || "TA / Driver";
            const selectMenu = document.getElementById('sim-menu');
            const menuName = selectMenu.value;
            const hargaSatuan = parseInt(selectMenu.options[selectMenu.selectedIndex].getAttribute('data-harga')) || 0;
            const qty = parseInt(document.getElementById('sim-qty').value);
            const notes = document.getElementById('sim-notes').value;
            
            const waktuMasuk = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
            const totalHarga = hargaSatuan * qty;

            dataTiketAktif[orderCount] = {
                meja: meja,
                menu: menuName,
                qty: qty,
                notes: notes || "-",
                totalHarga: totalHarga
            };

            createTicketElement(orderCount, meja, waktuMasuk, menuName, qty, notes);
            orderCount++;
            
            document.getElementById('sim-notes').value = "";
            document.getElementById('sim-qty').value = "1";
        }

        function createTicketElement(id, meja, waktu, menu, qty, notes) {
            const kdsArea = document.getElementById('kds-area');
            const card = document.createElement('div');
            card.className = 'ticket-card';
            card.id = `ticket-${id}`;

            if(id % 3 === 0) { card.className += ' urgent'; }

            let notesHTML = notes ? `<div class="item-notes">* NB: ${notes}</div>` : '';

            card.innerHTML = `
                <div class="ticket-header">
                    <div class="ticket-id">#${id}</div>
                    <div class="ticket-meta">
                        <strong>MEJA: ${meja}</strong><br>
                        Jam: ${waktu}
                    </div>
                </div>
                <div class="ticket-body">
                    <div class="order-item">
                        <span><span class="item-qty">${qty}x</span> ${menu}</span>
                    </div>
                    ${notesHTML}
                </div>
                <div class="ticket-footer">
                    <button class="btn-done" onclick="selesaikanPesanan(${id})">✓ SELESAI</button>
                </div>
            `;
            kdsArea.insertBefore(card, kdsArea.firstChild);
        }

        function selesaikanPesanan(id) {
            const tiket = document.getElementById(`ticket-${id}`);
            if (tiket) {
                tiket.style.transform = "scale(0)";
                tiket.style.transition = "transform 0.3s ease";
                
                setTimeout(() => {
                    const data = dataTiketAktif[id] || { meja: "-", menu: "Menu", qty: 0, notes: "-", totalHarga: 0 };
                    const waktuSelesai = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                    
                    // PROSES HITUNG OTOMATIS TAMBAH JUMLAH
                    akumulasiOmzet += data.totalHarga;
                    akumulasiQty += data.qty;

                    // Update tulisan angka jumlah di layar secara real-time
                    document.getElementById('total-omzet').innerText = "Rp " + akumulasiOmzet.toLocaleString('id-ID');
                    document.getElementById('total-qty-terjual').innerText = akumulasiQty + " Porsi";

                    const historyArea = document.getElementById('history-area');
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${waktuSelesai}</td>
                        <td><strong>#${id}</strong></td>
                        <td>${data.meja}</td>
                        <td>${data.qty}x ${data.menu}</td>
                        <td style="font-style: italic; color: #a4b0be;">${data.notes}</td>
                        <td style="color:#2ed573; font-weight:bold;">Rp ${data.totalHarga.toLocaleString('id-ID')}</td>
                        <td><span class="status-badge">DONE</span></td>
                    `;
                    
                    historyArea.insertBefore(row, historyArea.firstChild);
                    tiket.remove();
                    delete dataTiketAktif[id];
                }, 300);
            }
        }

        window.onload = function() {
            // Bersih tanpa dummy data awal
        };
    </script>
</body>
  </html>
