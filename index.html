<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS Terhubung - Kedai Moods</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #1e1e24; color: #fff; padding: 20px; }
        header { background-color: #ff4757; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.6rem; letter-spacing: 2px; }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }

        .panel { background: #2f3542; padding: 20px; border-radius: 8px; border: 1px solid #3f4451; }
        .section-title { font-size: 1.3rem; color: #ffa502; margin-bottom: 15px; border-left: 5px solid #ffa502; padding-left: 10px; }
        
        /* FORM INPUT */
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group select, .form-group input { width: 100%; padding: 10px; font-weight: bold; background: #fff; color: #000; border: none; border-radius: 4px; }
        .btn-kirim { width: 100%; background: #2ed573; color: black; border: none; padding: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        
        /* TIKET ANTRIAN */
        .kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .ticket-card { background: #ffffff; color: #000000; border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; border-top: 8px solid #ffa502; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .ticket-header { background: #f1f2f6; padding: 8px; border-bottom: 2px dashed #ccc; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .ticket-id { font-weight: bold; font-size: 1.1rem; }
        .ticket-body { padding: 10px; flex-grow: 1; font-weight: bold; }
        .item-qty { color: #ff4757; }
        .item-notes { font-size: 0.8rem; color: #747d8c; margin-top: 5px; font-style: italic; }
        .btn-done { width: 100%; background-color: #2ed573; color: white; border: none; padding: 8px; font-weight: bold; cursor: pointer; }

        /* RINGKASAN */
        .summary-box { display: flex; gap: 10px; margin-top: 15px; background: #212529; padding: 10px; border-radius: 4px; text-align: center; }
        .summary-card { flex: 1; }
        .summary-card h5 { color: #2ed573; font-size: 1.2rem; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>🖥️ SISTEM LINKED KDS KEDAI MOODS</h1>
        <div id="live-clock" style="font-weight: bold;">00:00:00</div>
    </header>

    <div class="grid-layout">
        <!-- LINK PANEL KASIR (KIRI) -->
        <div class="panel">
            <h2 class="section-title">[1] Panel Input Kasir</h2>
            <div class="form-group">
                <label>Nomor Meja / Antrean:</label>
                <input type="text" id="sim-meja" placeholder="Contoh: Meja 05 atau Grab">
            </div>
            <div class="form-group">
                <label>Pilih Menu:</label>
                <select id="sim-menu">
                    <option value="Thai Tea" data-harga="10000">Thai Tea (10k)</option>
                    <option value="Green Tea" data-harga="10000">Green Tea (10k)</option>
                    <option value="Teh Tarik" data-harga="10000">Teh Tarik (10k)</option>
                    <option value="Cireng Ayam" data-harga="10000">Cireng Ayam (10k)</option>
                    <option value="Americano" data-harga="8000">Americano (8k)</option>
                    <option value="Chocolate Milk" data-harga="10000">Chocolate Milk (10k)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jumlah (Qty):</label>
                <input type="number" id="sim-qty" value="1" min="1">
            </div>
            <div class="form-group">
                <label>Catatan Khusus:</label>
                <input type="text" id="sim-notes" placeholder="Contoh: Es sedikit, pedas banget">
            </div>
            <button class="btn-kirim" onclick="kirimKeDapur()">KIRIM PESANAN KDS ➡️</button>
        </div>

        <!-- LINK MONITOR DAPUR (KANAN) -->
        <div class="panel">
            <h2 class="section-title" style="color: #2ed573; border-left-color: #2ed573;">[2] Monitor Live Dapur & Total</h2>
            <div class="kds-grid" id="kds-area"></div>
            
            <div class="summary-box">
                <div class="summary-card">
                    <p style="font-size: 0.8rem; color:#a4b0be;">TOTAL PENDAPATAN</p>
                    <h5 id="total-omzet">Rp 0</h5>
                </div>
                <div class="summary-card">
                    <p style="font-size: 0.8rem; color:#a4b0be;">ITEM SELESAI</p>
                    <h5 id="total-qty-terjual" style="color: #ffa502;">0 Porsi</h5>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sinkronisasi Waktu
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);

        // FUNGSI UTAMA: Ambil data terbaru dari memori Chrome dan tampilkan
        function sinkronisasiData() {
            const kdsArea = document.getElementById('kds-area');
            kdsArea.innerHTML = "";

            // Ambil data antrean aktif
            let listPesanan = JSON.parse(localStorage.getItem("kds_pesanan")) || [];
            
            listPesanan.forEach((order) => {
                const card = document.createElement('div');
                card.className = 'ticket-card';
                card.innerHTML = `
                    <div class="ticket-header">
                        <div class="ticket-id">#${order.id}</div>
                        <div><strong>${order.meja}</strong><br>${order.waktu}</div>
                    </div>
                    <div class="ticket-body">
                        <span class="item-qty">${order.qty}x</span> ${order.menu}
                        <div class="item-notes">${order.notes}</div>
                    </div>
                    <button class="btn-done" onclick="selesaiMasak(${order.id})">✓ SELESAI</button>
                `;
                kdsArea.appendChild(card);
            });

            // Ambil data total akumulasi
            let omzet = localStorage.getItem("kds_omzet") || 0;
            let totalQty = localStorage.getItem("kds_total_qty") || 0;
            document.getElementById('total-omzet').innerText = "Rp " + parseInt(omzet).toLocaleString('id-ID');
            document.getElementById('total-qty-terjual').innerText = totalQty + " Porsi";
        }

        // AKSI KASIR: Menyimpan data baru ke memori Chrome
        function kirimKeDapur() {
            const meja = document.getElementById('sim-meja').value || "Antrean";
            const selectMenu = document.getElementById('sim-menu');
            const menuName = selectMenu.value;
            const hargaSatuan = parseInt(selectMenu.options[selectMenu.selectedIndex].getAttribute('data-harga')) || 0;
            const qty = parseInt(document.getElementById('sim-qty').value);
            const notes = document.getElementById('sim-notes').value || "-";
            const waktu = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
            
            let listPesanan = JSON.parse(localStorage.getItem("kds_pesanan")) || [];
            let currentId = parseInt(localStorage.getItem("kds_id_counter")) || 100;

            listPesanan.push({
                id: currentId, meja: meja, menu: menuName, qty: qty, notes: notes, hargaTotal: (hargaSatuan * qty), waktu: waktu
            });

            localStorage.setItem("kds_pesanan", JSON.stringify(listPesanan));
            localStorage.setItem("kds_id_counter", currentId + 1);

            document.getElementById('sim-notes').value = "";
            document.getElementById('sim-qty').value = "1";
            
            sinkronisasiData(); // Perbarui tampilan tab saat ini
        }

        // AKSI DAPUR: Mengupdate status selesai dan memperbarui jumlah
        function selesaiMasak(id) {
            let listPesanan = JSON.parse(localStorage.getItem("kds_pesanan")) || [];
            let orderSelesai = listPesanan.find(o => o.id === id);

            if (orderSelesai) {
                // Update Omzet & Jumlah porsi
                let omzetSkrg = parseInt(localStorage.getItem("kds_omzet")) || 0;
                let qtySkrg = parseInt(localStorage.getItem("kds_total_qty")) || 0;

                localStorage.setItem("kds_omzet", omzetSkrg + orderSelesai.hargaTotal);
                localStorage.setItem("kds_total_qty", qtySkrg + orderSelesai.qty);

                // Hapus dari list antrean aktif
                listPesanan = listPesanan.filter(o => o.id !== id);
                localStorage.setItem("kds_pesanan", JSON.stringify(listPesanan));
            }

            sinkronisasiData(); // Perbarui tampilan tab saat ini
        }

        // EVENT DETECTOR: Deteksi otomatis jika ada perubahan data dari tab kasir sebelah
        window.addEventListener('storage', function(e) {
            sinkronisasiData();
        });

        // Load data awal saat aplikasi dibuka
        window.onload = sinkronisasiData;
    </script>
</body>
    </html>
